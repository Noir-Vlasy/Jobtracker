<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="nav ">
    <div class="container">
        <div class="logo">
            <a href="#">Job Tracker</a>
        </div>
        <div id="mainListDiv" class="main_list">
            <ul class="navlinks">
                <li><a href="#">About</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
        <span class="navTrigger">
                <i></i>
                <i></i>
                <i></i>
            </span>
    </div>
</nav>

<section class="home">
</section>







<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<div class="position-fixed top-0 end-0 p-3" style="z-index: 11">
    <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
                Action successful
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">     <!-- navbar-->
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <!--declare flexbox for justify and align use -->

        <!-- LEFT: Welcome, 'user' -->
        <div class="text-white fs-6"> <!-- Font size and color -->
            Welcome, <span th:text="${session.loggedInUser.username}"></span>
        </div>

        <!-- CENTER: app name -->
        <a class="navbar-brand mx-auto position-absolute start-50 translate-middle-x" href="/">
            JobTracker
        </a>

        <!-- RIGHT, chochle "Buttons" -->
        <ul class="navbar-nav ms-auto align-items-center">

            <li class="nav-item me-2">
                <a class="btn btn-outline-light btn-sm" href="/">Dashboard</a>
            </li>

            <li class="nav-item me-2">        <!-- Dark mode toggle-->
                <button id="themeToggle" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-moon"></i>
                </button>
            </li>

            <li class="nav-item me-2"
                th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}">
                <a class="btn btn-warning btn-sm" href="/admin">Admin</a>
            </li>

            <li class="nav-item">
                <a class="btn btn-danger btn-sm" href="/logout">Logout</a>
            </li>

        </ul>

    </div>
</nav>

<div class="container mt-5 ">    <!-- Form for adding new Jobs -->

    <h3 class="mb-4 justify-content-center">Add Job</h3>

    <form action="/add-job" method="post" class="needs-validation" novalidate>

        <div class="row ">

            <div class="col-md-6 mb-3 ">
                <label class="form-label ">Company</label>
                <input type="text" name="company" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Role</label>
                <input type="text" name="role" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3 ">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option>Applied</option>
                    <option>Interview</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control"></textarea>
            </div>

        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary w-25 ">Save Job</button>
        </div>
    </form>

</div>

<hr>

<div class="container mt-4"> <!-- Search form Container -->

    <form id="searchForm" method="get" action="/" class="row g-3 mb-4 align-items-end">

        <!-- Search -->
        <div class="col-12 col-md-6 col-lg-3">
            <input type="text" id="searchInput" name="keyword" class="form-control"
                   placeholder="Search by company or role" th:value="${param.keyword}">
        </div>

        <!-- Filter -->
        <div class="col-12 col-md-6 col-lg-3">
            <select name="status" class="form-select">
                <option value="">All Status</option>
                <option value="Applied" th:selected="${param.status == 'Applied'}">Applied</option>
                <option value="Interview" th:selected="${param.status == 'Interview'}">Interview</option>
                <option value="Offer" th:selected="${param.status == 'Offer'}">Offer</option>
                <option value="Rejected" th:selected="${param.status == 'Rejected'}">Rejected</option>
            </select>
        </div>

        <!-- Sort -->
        <div class="col-12 col-md-6 col-lg-3">
            <select name="sort" class="form-select"
                    onchange="document.getElementById('searchForm').submit()">

                <option value="">Sort By</option>
                <option value="company" th:selected="${sort == 'company'}">Company</option>
                <option value="status" th:selected="${sort == 'status'}">Status</option>
                <option value="recent" th:selected="${sort == 'recent'}">Recently Added</option>

            </select>
        </div>

        <!-- Buttons -->
        <div class="col-12 col-lg-3 d-flex justify-content-center justify-content-lg-center gap-2">
            <button type="submit" class="btn btn-primary px-4">
                Search
            </button>
            <a href="/" class="btn btn-secondary px-4">
                Clear
            </a>
        </div>

    </form>


    <h2 class="mb-3">All Jobs</h2>

    <div class="table-responsive text-wrap">     <!-- Table to display Jobs for logged-in user -->
        <table class="table table-striped table-bordered table-hover " style="table-layout: fixed; width: 100%;">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Company</th>
                <th>Role</th>
                <th>Status</th>
                <th>Notes</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody class="text-wrap">
            <tr th:each="job : ${jobs}">
                <td th:text="${job.id}"></td>
                <td th:text="${job.company}"></td>
                <td th:text="${job.role}"></td>
                <td th:text="${job.status}"></td>
                <td class="text-break" style="white-space: normal;" th:text="${job.notes}"></td>

                <td>
                    <a th:href="@{'/edit/' + ${job.id}}" class="btn btn-warning btn-sm">Edit</a>

                    <a th:href="@{'/delete/' + ${job.id}}"
                       onclick="return confirm('Are you sure you want to delete this job?')"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>

            </tr>
            </tbody>
        </table>
    </div>

    <div class="">

    </div>

</div>
<script src="/js/index.js"></script>
<script src="/js/darkmode.js"></script>








<!-- Jquery needed -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="js/scripts.js"></script>

<!-- Function used to shrink nav bar removing paddings and adding black background -->
<script>
    $(window).scroll(function() {
        if ($(document).scrollTop() > 50) {
            $('.nav').addClass('affix');
            console.log("OK");
        } else {
            $('.nav').removeClass('affix');
        }
    });
</script>
<script src="script.js"></script>
</body>
</html>
