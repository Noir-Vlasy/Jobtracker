<!DOCTYPE html>
<!--suppress ALL -->
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Job Tracker</title>
    <link rel="stylesheet" th:href="@{/css/darkmode.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

<h2 class=" mt-3 text-center">Admin Dashboard</h2>
<div class="container mb-5">
    <div class="row text-center mb-4 mt-4">

        <div class="col-md-6 ">

            <div class="card p-3 shadow">
                <h5>Total Users</h5>
                <h2 th:text="${totalUsers}"></h2>
            </div>
            
        </div>

        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h5>Total Jobs</h5>
                <h2 th:text="${totalJobs}"></h2>
            </div>
        </div>



        <h3 class="mt-4">Job Status Distribution</h3>

        <div style="max-width: 400px; margin: auto;">
            <canvas id="statusChart"></canvas>
        </div>

    </div>
    <div class="container">
        <h3 class="mt-4">All Users</h3>

        <table class="table table-striped table-bordered mt-2">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="u : ${users}">

                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.role}"></td>
                <td class="text-center ">
                    <a th:href="@{'/admin/delete-user/' + ${u.id}}"
                       onclick="return confirm('Delete this user?')">
                        <button class="btn btn-danger btn-sm ">Delete</button>
                    </a>
                </td>
            </tr>
            </tbody>

        </table>
    </div>
    <div class="container">
        <h3 class="mt-4">All Jobs</h3>

        <table class="table table-hover table-bordered mt-2">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Company</th>
                <th>Role</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="j : ${jobs}">
                <td th:text="${j.id}"></td>
                <td th:text="${j.user.username}"></td>
                <td th:text="${j.company}"></td>
                <td th:text="${j.role}"></td>
                <td th:text="${j.status}"></td>
                <td>
                    <a th:href="@{'/admin/delete-job/' + ${j.id}}"
                       onclick="return confirm('Delete this job ?')">
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="container text-center">
            <a href="/h2-console" class="btn btn-warning ">Open H2 Console</a>
            <a href="/" class="btn btn-secondary ">Back</a>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let statusData = /*[[${statusCount}]]*/ {};

    const labels = Object.keys(statusData);
    const data = Object.values(statusData);

    const ctx = document.getElementById('statusChart').getContext('2d');

    // noinspection JSUnresolvedReference
    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                label: 'Job Status',
                data: data
            }]
        }
    });
</script>

<script src="/js/darkmode.js"></script>

</body>
</html>
