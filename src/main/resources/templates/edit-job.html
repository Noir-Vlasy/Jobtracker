<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Job</title>
    <link rel="stylesheet" th:href="@{/css/darkmode.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">

    <h3 class="mb-4">Edit Job</h3>

    <form th:action="@{'/update/' + ${job.id}}" method="post">

        <div class="mb-3">
            <label class="form-label">Company</label>
            <input type="text" name="company" class="form-control"
                   th:value="${job.company}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Role</label>
            <input type="text" name="role" class="form-control"
                   th:value="${job.role}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option th:selected="${job.status == 'Applied'}">Applied</option>
                <option th:selected="${job.status == 'Interview'}">Interview</option>
                <option th:selected="${job.status == 'Offer'}">Offer</option>
                <option th:selected="${job.status == 'Rejected'}">Rejected</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control"
                      th:text="${job.notes}"></textarea>
        </div>

        <div class="d-flex justify-content-between">
            <a href="/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Update Job</button>
        </div>

    </form>

</div>

<script src="/js/darkmode.js"></script>

</body>
</html>
