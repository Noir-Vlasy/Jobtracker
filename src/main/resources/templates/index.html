<!DOCTYPE html> <!-- -->
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Tracker</title>
<!--    <link rel="stylesheet" th:href="@{/css/style.css}"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid d-flex justify-content-between align-items-center"> <!--declare flexbox for justify and align use -->

        <!-- LEFT: Welcome, 'user' -->
        <div class="text-white fs-6"> <!-- Font size and color -->
            Welcome, <span th:text="${session.loggedInUser.username}"></span>
        </div>

        <!-- CENTER: app name -->
        <a class="navbar-brand mx-auto position-absolute start-50 translate-middle-x" href="/">
            JobTracker
        </a>

        <!-- RIGHT, chochle "Buttons" -->
        <ul class="navbar-nav ms-auto align-items-center">

            <li class="nav-item me-2">
                <a class="btn btn-outline-light btn-sm" href="/">Dashboard</a>
            </li>

            <li class="nav-item me-2"
                th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}">
                <a class="btn btn-warning btn-sm" href="/admin">Admin</a>
            </li>

            <li class="nav-item">
                <a class="btn btn-danger btn-sm" href="/logout">Logout</a>
            </li>

        </ul>

    </div>
</nav>

    <div class="container mt-5 ">    <!-- Form for adding new Jobs -->

        <h3 class="mb-4 justify-content-center">Add Job</h3>

        <form action="/add-job" method="post">

            <div class="row ">

                <div class="col-md-6 mb-3 ">
                    <label class="form-label ">Company</label>
                    <input type="text" name="company" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Role</label>
                    <input type="text" name="role" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3 ">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option>Applied</option>
                        <option>Interview</option>
                        <option>Offer</option>
                        <option>Rejected</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control"></textarea>
                </div>

            </div>
            <div class="text-center">
            <button type="submit" class="btn btn-primary w-25 ">Save Job</button>
            </div>
        </form>

    </div>

    <hr>

    <div class="container mt-4"> <!-- Search form Container -->

        <form id="searchForm" method="get" action="/" class="row g-3 mb-4">     <!-- Search form -->

            <!-- Search -->
            <div class="col-md-5">
                <input type="text" id="searchInput" name="keyword" class="form-control"
                       placeholder="Search by company or role">
            </div>

            <!-- Filter -->
            <div class="col-md-4">
                <select name="status" class="form-select">
                    <option value="">All Status</option>
                    <option>Applied</option>
                    <option>Interview</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
            </div>

            <!-- Button -->
            <div class="col-md-3 d-flex">
                <button type="submit" class="btn btn-primary w-100">
                    Search
                </button>
            </div>

        </form>

        <h2 class="mb-3">All Jobs</h2>

        <table class="table table-striped table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Company</th>
                <th>Role</th>
                <th>Status</th>
                <th>Notes</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="job : ${jobs}">
                <td th:text="${job.id}"></td>
                <td th:text="${job.company}"></td>
                <td th:text="${job.role}"></td>
                <td th:text="${job.status}"></td>
                <td th:text="${job.notes}"></td>

                <td>
                    <a th:href="@{'/edit/' + ${job.id}}" class="btn btn-warning btn-sm">Edit</a>

                    <a th:href="@{'/delete/' + ${job.id}}"
                       onclick="return confirm('Are you sure you want to delete this job?')"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
</div>

<script>
    let timeout = null;

    const input = document.getElementById("searchInput");

    input.addEventListener("keyup", function () {

        clearTimeout(timeout);

        timeout = setTimeout(() => {
            document.getElementById("searchForm").submit();
        },1000);  //1sec delay
    });
</script>

</body>
</html>
