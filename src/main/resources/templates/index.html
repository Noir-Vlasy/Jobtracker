<!DOCTYPE html> <!-- -->
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Tracker</title>
    <!--    <link rel="stylesheet" th:href="@{/css/style.css}"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:if="${param.success}">
    <div id="successAlert" class="alert alert-success text-center">

        <span th:if="${param.success[0] == 'added'}">
            Job added successfully
        </span>

        <span th:if="${param.success[0] == 'deleted'}">
            Job deleted successfully
        </span>

        <span th:if="${param.success[0] == 'updated'}">
            Job updated successfully
        </span>

    </div>
</div>

<div class="position-fixed top-0 end-0 p-3" style="z-index: 11">
    <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
                Action successful
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <!--declare flexbox for justify and align use -->

        <!-- LEFT: Welcome, 'user' -->
        <div class="text-white fs-6"> <!-- Font size and color -->
            Welcome, <span th:text="${session.loggedInUser.username}"></span>
        </div>

        <!-- CENTER: app name -->
        <a class="navbar-brand mx-auto position-absolute start-50 translate-middle-x" href="/">
            JobTracker
        </a>

        <!-- RIGHT, chochle "Buttons" -->
        <ul class="navbar-nav ms-auto align-items-center">

            <li class="nav-item me-2">
                <a class="btn btn-outline-light btn-sm" href="/">Dashboard</a>
            </li>

            <li class="nav-item me-2"
                th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}">
                <a class="btn btn-warning btn-sm" href="/admin">Admin</a>
            </li>

            <li class="nav-item">
                <a class="btn btn-danger btn-sm" href="/logout">Logout</a>
            </li>

        </ul>

    </div>
</nav>

<div class="container mt-5 ">    <!-- Form for adding new Jobs -->

    <h3 class="mb-4 justify-content-center">Add Job</h3>

    <form action="/add-job" method="post" class="needs-validation" novalidate>

        <div class="row ">

            <div class="col-md-6 mb-3 ">
                <label class="form-label ">Company</label>
                <input type="text" name="company" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Role</label>
                <input type="text" name="role" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3 ">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option>Applied</option>
                    <option>Interview</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control"></textarea>
            </div>

        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary w-25 ">Save Job</button>
        </div>
    </form>

</div>

<hr>

<div class="container mt-4"> <!-- Search form Container -->

    <form id="searchForm" method="get" action="/" class="row g-3 mb-4">     <!-- Search form -->

        <!-- Search -->
        <div class="col-md-5">
            <input type="text" id="searchInput" name="keyword" class="form-control"
                   placeholder="Search by company or role" th:value="${param.keyword}">
        </div>

        <!-- Filter -->
        <div class="col-md-4">
            <select name="status" class="form-select" th:value="${param.status}">
                <option value="">All Status</option>
                <option>Applied</option>
                <option>Interview</option>
                <option>Offer</option>
                <option>Rejected</option>
            </select>
        </div>

        <!-- Button -->
        <div class="col-md-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary w-50 ">
                Search
            </button>
            <a href="/" class="btn btn-secondary w-50 ">Clear</a>
        </div>

    </form>

    <h2 class="mb-3">All Jobs</h2>

    <table class="table table-striped table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Company</th>
            <th>Role</th>
            <th>Status</th>
            <th>Notes</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="job : ${jobs}">
            <td th:text="${job.id}"></td>
            <td th:text="${job.company}"></td>
            <td th:text="${job.role}"></td>
            <td th:text="${job.status}"></td>
            <td th:text="${job.notes}"></td>

            <td>
                <a th:href="@{'/edit/' + ${job.id}}" class="btn btn-warning btn-sm">Edit</a>

                <a th:href="@{'/delete/' + ${job.id}}"
                   onclick="return confirm('Are you sure you want to delete this job?')"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    let timeout = null;

    const input = document.getElementById("searchInput");
    const form = document.getElementById("searchForm");
    const status = document.querySelector("select[name='status']");

    input.addEventListener("keyup", function () {
        clearTimeout(timeout);
        timeout = setTimeout(() => form.submit(), 400);
    });

    status.addEventListener("change", function () {
        clearTimeout(timeout);
        timeout = setTimeout(() => form.submit(), 400)
    });

    //Form Validation
    (() => {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');

        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
<script>
    const params = new URLSearchParams(window.location.search);
    const success = params.get("success");

    if (success) {
        let message = "";

        if (success === "added") message = "Job added successfully";
        if (success === "deleted") message = "Job deleted successfully";
        if (success === "updated") message = "Job updated successfully";

        document.getElementById("toastMessage").innerText = message;

        const toast = new bootstrap.Toast(document.getElementById('liveToast'));
        toast.show();
    }
    //Action Notification timeout
    setTimeout(() => {
        const alert = document.getElementById("successAlert");
        if (alert) {
            alert.style.transition = "opacity 0.5s ease";
            alert.style.opacity = "0";

            setTimeout(() => {
                alert.remove();
            }, 500);
        }
    }, 3000); // 3 seconds
</script>

</body>
</html>
