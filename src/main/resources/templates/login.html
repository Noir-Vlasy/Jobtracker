<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2>Login</h2>

<div th:if="${param.error}" style="color:#dc3030;">
    Invalid username or password
</div>

<form action="/login" method="post">
    <input type="text" name="username" placeholder="Username" required style="margin:5px; padding:8px;"> <br>
    <input type="password" name="password" placeholder="Password" required style="margin:5px; padding:8px;"> <br>
    <button type="submit">Login</button>
</form>

<a href="/register"><button type="submit">Register</button></a>

</body>
</html>
